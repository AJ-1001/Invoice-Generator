<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell no-print">
    <div class="toolbar">
        <div class="toolbar-brand">
            <span class="brand-icon">◈</span>
            <span>Invoice Studio</span>
        </div>
        <div class="toolbar-actions">
            <button class="tool-btn" onclick="addItem()">+ Add Line</button>
            <button class="tool-btn primary" onclick="window.print()">⎙ Print / PDF</button>
        </div>
    </div>
</div>

<div class="invoice-box">
    <!-- Watermark -->
    <div id="watermark">
        <img id="watermark-img" style="display:none;" alt="">
        <div id="watermark-text">TECH SOLUTIONS</div>
    </div>

    <div class="content-wrapper">

        <!-- HEADER -->
        <div class="invoice-header">
            <div class="company-side">
                <div class="logo-zone">
                    <img id="logo-preview" alt="Logo">
                    <label for="logo-upload" class="upload-label no-print" id="logo-label">
                        <span class="upload-icon">+</span>
                        <span>Upload Logo</span>
                    </label>
                    <input type="file" id="logo-upload" class="hidden-input" accept="image/*" onchange="loadLogo(event)">
                </div>
                <input class="company-name-input" type="text" id="company-name" value="TECH SOLUTIONS LLC" oninput="updateWatermark()">
                <input type="text" class="subtle-input" placeholder="Website · e.g. www.yourcompany.com">
                <textarea class="subtle-input" rows="3" placeholder="123 Business Street, Suite 400&#10;City, State — ZIP&#10;✉ billing@company.com  ☎ (555) 000-0000"></textarea>
            </div>

            <div class="invoice-meta">
                <div class="invoice-badge">INVOICE</div>
                <div class="meta-row">
                    <label>Invoice #</label>
                    <input type="text" value="INV-2026-001">
                </div>
                <div class="meta-row">
                    <label>Date</label>
                    <input type="date" id="invoice-date">
                </div>
                <div class="meta-row">
                    <label>Due Date</label>
                    <input type="date" id="due-date">
                </div>
                <div class="meta-row no-print">
                    <label>Currency</label>
                    <select id="currency-selector" onchange="updateCurrency()">
                        <option value="$">USD ($)</option>
                        <option value="€">EUR (€)</option>
                        <option value="£">GBP (£)</option>
                        <option value="₹" selected>INR (₹)</option>
                        <option value="¥">JPY (¥)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- BILLED TO -->
        <div class="bill-section">
            <div class="bill-to">
                <div class="section-label">Billed To</div>
                <input type="text" class="bill-name" placeholder="Client / Company Name">
                <input type="text" class="subtle-input" placeholder="Attn: Contact Person">
                <textarea class="subtle-input" rows="3" placeholder="Street Address&#10;City, State, ZIP / PIN&#10;Country"></textarea>
            </div>
        </div>

        <!-- LINE ITEMS -->
        <div class="table-wrapper">
            <table id="items-table">
                <thead>
                    <tr>
                        <th class="col-desc">Description</th>
                        <th class="col-freq">Frequency</th>
                        <th class="col-qty">Qty / Hrs</th>
                        <th class="col-rate">Rate</th>
                        <th class="col-amt">Amount</th>
                        <th class="col-del no-print"></th>
                    </tr>
                </thead>
                <tbody id="invoice-items">
                    <tr>
                        <td>
                            <input type="text" value="Custom Software Development" class="item-name">
                            <textarea class="item-desc" rows="2" placeholder="Brief description of the deliverable…"></textarea>
                        </td>
                        <td>
                            <select class="frequency">
                                <option value="One-Time">One-Time</option>
                                <option value="Monthly">Monthly</option>
                                <option value="Yearly">Yearly</option>
                            </select>
                        </td>
                        <td><input type="number" class="qty" value="40" oninput="calculateTotal()"></td>
                        <td><input type="number" class="rate" value="1000" oninput="calculateTotal()"></td>
                        <td class="amount-cell"><span class="curr-sym">₹</span><span class="amount">40,000.00</span></td>
                        <td class="no-print"><button class="del-btn" onclick="removeItem(this)">✕</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="no-print add-row-wrap">
            <button class="add-line-btn" onclick="addItem()">+ Add Line Item</button>
        </div>

        <!-- TOTALS -->
        <div class="totals-area">
            <div class="totals-box">
                <div class="totals-row">
                    <span>Subtotal</span>
                    <span><span class="curr-sym">₹</span><span id="subtotal">40,000.00</span></span>
                </div>
                <div class="totals-row no-print">
                    <span>Tax Rate (%)</span>
                    <input type="number" id="tax-rate" value="0" oninput="calculateTotal()" placeholder="0">
                </div>
                <div class="totals-row" id="tax-display-row">
                    <span>Tax</span>
                    <span><span class="curr-sym">₹</span><span id="tax-amount">0.00</span></span>
                </div>
                <div class="totals-row subtotal-after-tax-row" id="after-tax-row" style="display:none;">
                    <span>Amount After Tax</span>
                    <span><span class="curr-sym">₹</span><span id="after-tax-amount">0.00</span></span>
                </div>
                <div class="totals-row no-print discount-input-row">
                    <span>Discount (flat)</span>
                    <input type="number" id="discount-amount" value="0" oninput="calculateTotal()" placeholder="0">
                </div>
                <div class="totals-row discount-display-row" id="display-discount-row" style="display:none;">
                    <span>Discount</span>
                    <span class="discount-val">− <span class="curr-sym">₹</span><span id="display-discount">0.00</span></span>
                </div>
                <div class="totals-row grand-total-row">
                    <span>Total Due</span>
                    <span><span class="curr-sym">₹</span><span id="grand-total">40,000.00</span></span>
                </div>
            </div>
        </div>

        <!-- FOOTER: Notes + QR + Signature -->
        <div class="invoice-footer">
            <div class="notes-col">
                <div class="section-label">Payment Terms & Notes</div>
                <textarea class="notes-area" rows="4" placeholder="Net 30 Days. Late payments subject to 1.5% monthly interest.&#10;Bank: · Account No: · IFSC/SWIFT:"></textarea>

                <div class="qr-zone">
                    <div class="qr-label">Scan to Pay via UPI</div>
                    <img id="qr-preview" alt="UPI QR Code">
                    <label for="qr-upload" class="upload-label no-print" id="qr-label">
                        <span class="upload-icon">+</span>
                        <span>Upload QR Code</span>
                    </label>
                    <input type="file" id="qr-upload" class="hidden-input no-print" accept="image/*" onchange="loadQR(event)">
                </div>
            </div>

            <div class="sig-col">
                <input type="text" class="sig-name" placeholder="Authorized Signatory Name">
                <div class="sig-image-wrap">
                    <img id="sig-preview" alt="Signature">
                    <label for="sig-upload" class="upload-label no-print" id="sig-label">
                        <span class="upload-icon">+</span>
                        <span>Upload Signature</span>
                    </label>
                    <input type="file" id="sig-upload" class="hidden-input no-print" accept="image/*" onchange="loadSignature(event)">
                </div>
                <div class="sig-line"></div>
                <div class="sig-caption">Authorized Signature</div>
            </div>
        </div>

    </div><!-- /content-wrapper -->
</div><!-- /invoice-box -->

<script src="script.js"></script>
</body>
</html>
